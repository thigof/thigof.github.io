<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NPAT CONTROL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f0efea;
        --surface: #fff;
        --s2: #f7f6f2;
        --border: #e2e0d8;
        --bstrong: #c8c6bc;
        --text: #1a1917;
        --muted: #6b6a65;
        --hint: #9e9c96;
        --primary: #1a1917;
        --accent: #2d5be3;
        --accent2: #1e46c7;
        --danger: #c0392b;
        --success: #1b6b3a;
        --sbg: #edf7f1;
        --sborder: #a8d9bb;
        --dbg: #fdf0ee;
        --dborder: #eeb5ae;
        --info: #1a4faa;
        --ibg: #edf2fd;
        --iborder: #a8c0f0;
        --r: 6px;
        --rm: 10px;
        --rl: 14px;
        --sans: "IBM Plex Sans", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;
      }

      /* ── FIX #3: layout fixo — nada rola fora das zonas designadas ── */
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: var(--sans);
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        line-height: 1.5;
      }
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      button,
      input,
      select {
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      input,
      select {
        outline: none;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      .app {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* header fixo, nunca rola */
      .header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        height: 50px;
        background: var(--primary);
        z-index: 100;
      }
      .brand {
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 3px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      .nav-btn {
        padding: 5px 12px;
        border-radius: var(--r);
        border: 1px solid transparent;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .nav-btn.active {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border-color: rgba(255, 255, 255, 0.25);
      }
      .nav-sep {
        width: 1px;
        height: 18px;
        background: rgba(255, 255, 255, 0.15);
        margin: 0 4px;
        flex-shrink: 0;
      }
      .btn-exp {
        padding: 5px 12px;
        border-radius: var(--r);
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: transparent;
        color: rgba(255, 255, 255, 0.8);
        font-size: 12px;
        white-space: nowrap;
      }
      .btn-exp:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      /* área de conteúdo — expande, sem scroll global */
      .main {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── CONFERÊNCIA: layout fixo em duas zonas ── */
      .conf-host {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .conf-layout {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        max-width: 1060px;
        margin: 0 auto;
        width: 100%;
        padding: 14px 14px 0;
        gap: 12px;
        min-width: 0;
      }

      /* zona superior: painel de consulta — tamanho fixo, não rola */
      .conf-top {
        flex-shrink: 0;
        min-width: 0;
      }

      /* zona inferior: tabela — cresce e rola internamente */
      .conf-bottom {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--rl) var(--rl) 0 0;
        overflow: hidden;
      }
      .conf-bottom-head {
        flex-shrink: 0;
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
      }
      /* scroll confinado à tabela ou lista de cards */
      .conf-bottom-scroll {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }

      /* ── BASE e CONFIG: rolagem da própria aba ── */
      .tab-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 14px 14px 40px;
      }
      .tab-container {
        max-width: 1060px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      /* ── PANELS ── */
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--rl);
        padding: 16px 18px;
        min-width: 0;
        overflow: hidden;
      }
      .ptitle {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 12px;
      }

      /* ── FIELDS ── */
      .field {
        display: grid;
        gap: 4px;
        min-width: 0;
      }
      .field label {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .field input,
      .field select {
        height: 36px;
        padding: 0 11px;
        border: 1px solid var(--border);
        border-radius: var(--rm);
        background: var(--surface);
        color: var(--text);
        transition: border-color 0.15s;
        width: 100%;
        min-width: 0;
      }
      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(45, 91, 227, 0.08);
      }
      .field input::placeholder {
        color: var(--hint);
      }

      /* ── BUTTONS ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 0 14px;
        height: 36px;
        border-radius: var(--rm);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .btn:hover {
        background: var(--s2);
        border-color: var(--bstrong);
      }
      .btn-accent {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn-accent:hover {
        background: var(--accent2);
        border-color: var(--accent2);
      }
      .btn-accent:disabled {
        background: var(--bstrong);
        border-color: var(--bstrong);
        cursor: default;
        opacity: 0.7;
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--muted);
      }
      .btn-ghost:hover {
        background: var(--s2);
        border-color: var(--border);
        color: var(--text);
      }
      .btn-danger {
        background: var(--danger);
        color: #fff;
        border-color: var(--danger);
      }
      .btn-danger:hover {
        background: #a93226;
        border-color: #a93226;
      }
      .btn-neutral {
        background: var(--bstrong);
        color: var(--text);
        border-color: var(--bstrong);
      }
      .btn-neutral:hover {
        background: #b0aea5;
      }
      .btn-sm {
        height: 26px;
        padding: 0 10px;
        font-size: 11px;
        border-radius: var(--r);
      }

      /* ── CONSULT HERO ── */
      .consult-hero {
        display: flex;
        align-items: stretch;
        gap: 0;
        margin-bottom: 12px;
        border-radius: var(--rl);
        overflow: hidden;
        border: 2px solid var(--accent);
        box-shadow: 0 0 0 4px rgba(45, 91, 227, 0.1);
      }
      .consult-npat {
        flex: 1;
        min-width: 0;
      }
      .consult-npat input {
        width: 100%;
        height: 52px;
        padding: 0 16px;
        border: none;
        background: var(--surface);
        color: var(--text);
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .consult-npat input:focus {
        outline: none;
        box-shadow: none;
      }
      .consult-npat input::placeholder {
        color: var(--hint);
        font-size: 16px;
        font-weight: 400;
        letter-spacing: 0;
      }
      .btn-add-hero {
        height: 52px;
        padding: 0 22px;
        background: var(--accent);
        color: #fff;
        border: none;
        font-size: 22px;
        font-weight: 700;
        transition: background 0.15s;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-add-hero:hover {
        background: var(--accent2);
      }
      .btn-add-hero:disabled {
        background: var(--bstrong);
        cursor: default;
        opacity: 0.5;
      }

      /* ── RESULT CARD ── */
      .rcard {
        border: 1px solid var(--border);
        border-radius: var(--rm);
        background: var(--s2);
        min-width: 0;
        overflow: hidden;
      }
      .rcard-empty {
        padding: 18px 16px;
        color: var(--hint);
        font-size: 13px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .rcard-inner {
        padding: 14px 16px;
        width: 100%;
        min-width: 0;
      }
      .rcard-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        gap: 8px;
        flex-wrap: wrap;
      }
      .rcard-npat {
        font-family: var(--mono);
        font-size: 17px;
        font-weight: 600;
        line-height: 1.2;
      }
      .rcard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 8px 14px;
        margin-bottom: 12px;
      }
      .rfield {
        display: grid;
        gap: 3px;
        min-width: 0;
      }
      .rfield-lbl {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--hint);
      }
      .rfield-val {
        font-size: 13px;
        font-weight: 500;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      .rfield-inp {
        width: 100%;
        height: 34px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        transition: border-color 0.15s;
      }
      .rfield-inp:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(45, 91, 227, 0.08);
      }
      .rfield-inp::placeholder {
        color: var(--hint);
      }
      .rfield-sel {
        width: 100%;
        height: 34px;
        padding: 0 8px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
      }
      .rfield-sel:focus {
        border-color: var(--accent);
      }
      .rcard-divider {
        height: 1px;
        background: var(--border);
        margin: 10px 0;
      }
      .rcard-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 10px;
      }

      /* ── FIX #1: LOCK inline — campo + cadeado unidos ── */
      .lock-wrap {
        display: flex;
        align-items: stretch;
        min-width: 0;
        border-radius: var(--r);
        overflow: hidden;
        border: 1px solid var(--border);
        transition: border-color 0.15s;
      }
      .lock-wrap:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(45, 91, 227, 0.08);
      }
      .lock-wrap.is-locked {
        border-color: var(--iborder);
        background: var(--ibg);
      }
      .lock-inp {
        flex: 1;
        height: 34px;
        padding: 0 10px;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 13px;
        min-width: 0;
      }
      .lock-inp:focus {
        outline: none;
        box-shadow: none;
      }
      .lock-inp::placeholder {
        color: var(--hint);
      }
      .lock-inp:disabled {
        font-family: var(--mono);
        font-weight: 600;
        color: var(--info);
        cursor: default;
      }
      .lock-inp-sel {
        flex: 1;
        height: 34px;
        padding: 0 8px;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 13px;
        min-width: 0;
      }
      .lock-inp-sel:focus {
        outline: none;
      }
      .lock-btn {
        flex-shrink: 0;
        width: 36px;
        height: 34px;
        border: none;
        border-left: 1px solid var(--border);
        background: transparent;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s;
      }
      .lock-btn:hover {
        background: var(--s2);
      }
      .lock-wrap.is-locked .lock-btn {
        border-left-color: var(--iborder);
        background: transparent;
      }
      .lock-wrap.is-locked .lock-btn:hover {
        background: rgba(26, 79, 170, 0.1);
      }

      /* ── MANUAL FORM ── */
      .manual-inner {
        padding: 14px 16px;
        background: var(--surface);
        border-top: 1px solid var(--border);
      }
      .manual-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .manual-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }

      /* ── BADGES ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        white-space: nowrap;
        border: 1px solid;
        flex-shrink: 0;
      }
      .b-regular {
        background: var(--sbg);
        color: var(--success);
        border-color: var(--sborder);
      }
      .b-atualizar {
        background: var(--ibg);
        color: var(--info);
        border-color: var(--iborder);
      }
      .b-irregular {
        background: var(--dbg);
        color: var(--danger);
        border-color: var(--dborder);
      }

      /* ── SPILLS (filtros clicáveis) ── */
      .summary-bar {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      .spill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        border: 1px solid;
        white-space: nowrap;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s,
          box-shadow 0.15s;
        user-select: none;
      }
      .spill:hover {
        opacity: 0.8;
      }
      .spill:active {
        transform: scale(0.96);
      }
      .spill.active-filter {
        box-shadow: 0 0 0 2px currentColor;
      }
      .spill-n {
        font-family: var(--mono);
        font-size: 12px;
      }
      .sp-total {
        background: var(--s2);
        border-color: var(--border);
        color: var(--muted);
      }
      .sp-reg {
        background: var(--sbg);
        border-color: var(--sborder);
        color: var(--success);
      }
      .sp-atu {
        background: var(--ibg);
        border-color: var(--iborder);
        color: var(--info);
      }
      .sp-irr {
        background: var(--dbg);
        border-color: var(--dborder);
        color: var(--danger);
      }

      /* ── DETAIL TAGS ── */
      .dtag {
        display: inline-block;
        font-family: var(--mono);
        font-size: 9px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 5px;
        margin: 1px 1px 1px 0;
        color: var(--muted);
        overflow-wrap: break-word;
        word-break: break-all;
      }
      .dtag-atu {
        background: var(--ibg);
        border-color: var(--iborder);
        color: var(--info);
      }
      .dtag-irr {
        background: var(--dbg);
        border-color: var(--dborder);
        color: var(--danger);
      }

      /* ── TABLE ── */
      .table-wrap {
        overflow-x: auto;
        max-width: 100%;
        min-width: 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      thead th {
        background: var(--s2);
        padding: 8px 10px;
        text-align: left;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      tbody td {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        max-width: 220px;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #fafaf8;
      }
      tbody tr.tr-atu {
        background: #f5f8ff;
      }
      tbody tr.tr-irr {
        background: #fff8f7;
      }
      .inline-inp {
        width: 100%;
        min-width: 60px;
        height: 24px;
        padding: 0 7px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--surface);
        color: var(--text);
        font-size: 11px;
      }
      .inline-inp:focus {
        border-color: var(--accent);
      }
      .inline-sel {
        width: 100%;
        height: 24px;
        padding: 0 5px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--surface);
        color: var(--text);
        font-size: 11px;
      }
      .inline-sel:focus {
        border-color: var(--accent);
      }

      /* ── MOBILE CARDS ── */
      /* card-list must NOT be display:block — it sits inside conf-bottom-scroll which already scrolls */
      .card-list {
        display: none;
        padding: 8px 8px 16px;
        min-width: 0;
        box-sizing: border-box;
      }
      .icard {
        border: 1px solid var(--border);
        border-radius: var(--rm);
        background: var(--surface);
        margin-bottom: 8px;
        max-width: 100%;
      }
      .icard.c-atu {
        border-color: var(--iborder);
      }
      .icard.c-irr {
        border-color: var(--dborder);
      }
      .ic-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        min-width: 0;
        overflow: hidden;
      }
      .icard.c-atu .ic-summary {
        background: #f5f8ff;
      }
      .icard.c-irr .ic-summary {
        background: #fff8f7;
      }
      .ic-left {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
        flex: 1;
        overflow: hidden;
      }
      .ic-npat {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      .ic-desc {
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      .ic-tags-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 2px;
      }
      .ic-right {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .ic-chev {
        font-size: 10px;
        color: var(--hint);
        transition: transform 0.2s;
        line-height: 1;
      }
      .icard.expanded .ic-chev {
        transform: rotate(180deg);
      }
      .ic-body {
        display: none;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        gap: 8px;
        min-width: 0;
      }
      .icard.expanded .ic-body {
        display: grid;
      }
      .ic-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px 10px;
        min-width: 0;
      }
      .ic-field {
        display: grid;
        gap: 3px;
        min-width: 0;
      }
      .ic-field span {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--hint);
      }
      .ic-field strong {
        font-size: 12px;
        font-weight: 400;
        color: var(--muted);
        overflow-wrap: break-word;
        word-break: break-word;
      }
      .ic-inp {
        width: 100%;
        height: 28px;
        padding: 0 8px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
        min-width: 0;
      }
      .ic-sel {
        width: 100%;
        height: 28px;
        padding: 0 7px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
        min-width: 0;
      }
      .ic-inp:focus,
      .ic-sel:focus {
        border-color: var(--accent);
      }
      .ic-footer {
        display: flex;
        justify-content: flex-end;
        padding-top: 8px;
        border-top: 1px solid var(--border);
