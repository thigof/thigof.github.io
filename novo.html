      /* ── META ── */
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 1px;
        border: 1px solid var(--border);
        border-radius: var(--rm);
        overflow: hidden;
        background: var(--border);
        margin-top: 10px;
      }
      .meta-cell {
        background: var(--s2);
        padding: 8px 10px;
        min-width: 0;
      }
      .mc-label {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--hint);
        margin-bottom: 3px;
      }
      .mc-val {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── BASE SEARCH — lista rola dentro do painel ── */
      .sr-list {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: var(--rm);
        margin-top: 8px;
      }
      .sr-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        min-width: 0;
      }
      .sr-row:last-child {
        border-bottom: none;
      }
      .sr-row:hover {
        background: var(--s2);
      }
      .sr-check {
        flex-shrink: 0;
        cursor: pointer;
        width: 14px;
        height: 14px;
      }
      .sr-cells {
        display: flex;
        gap: 10px;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        cursor: pointer;
      }
      .sr-cell {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .sr-cell-npat {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        width: 90px;
      }
      .sr-cell-flex {
        flex: 1;
        min-width: 0;
      }

      /* ── CONFIG ── */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .check-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 6px 16px;
        margin-top: 8px;
      }
      .check-item {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        cursor: pointer;
        padding: 4px 0;
      }
      .check-item input {
        cursor: pointer;
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .parse-error {
        font-size: 12px;
        color: var(--danger);
        background: var(--dbg);
        border: 1px solid var(--dborder);
        border-radius: var(--r);
        padding: 8px 12px;
        margin-top: 8px;
      }
      .toast {
        position: fixed;
        bottom: 18px;
        right: 18px;
        background: var(--primary);
        color: #fff;
        padding: 9px 14px;
        border-radius: var(--rm);
        font-size: 12px;
        font-weight: 500;
        z-index: 1000;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        max-width: calc(100vw - 36px);
      }
      .dup-warn {
        font-size: 11px;
        color: var(--danger);
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      @media (max-width: 860px) {
        .rcard-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 680px) {
        .table-wrap {
          display: none;
        }
        .card-list {
          display: block;
        }
        /* conf-bottom-scroll needs explicit overflow when card-list is active */
        .conf-bottom-scroll {
          -webkit-overflow-scrolling: touch;
        }
      }
      @media (max-width: 600px) {
        .header {
          padding: 0 10px;
        }
        .brand {
          font-size: 12px;
        }
        .nav-btn {
          padding: 5px 8px;
          font-size: 11px;
        }
        .conf-layout {
          padding: 10px 8px 0;
          gap: 10px;
        }
        .panel {
          padding: 12px 12px;
        }
        .consult-npat input {
          font-size: 18px;
        }
        .rcard-grid {
          grid-template-columns: 1fr;
        }
        .manual-grid {
          grid-template-columns: 1fr;
        }
        .meta-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 400px) {
        .consult-npat input {
          font-size: 15px;
        }
        .btn-add-hero {
          padding: 0 14px;
          font-size: 16px;
        }
        .btn-exp {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback, useMemo } = React;

      const norm = (v) =>
        String(v)
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .trim();
      const esc = (v) =>
        String(v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      const STORAGE = {
        cfg: "npatcfg10",
        items: "npatitems10",
        csv: "npatcsv10", // ✅ NOVO
      };
      const DEF_CFG = {
        mapping: { npat: "", descricao: "", local: "", estado: "", obs: "" },
        lockLocal: "",
        locked: false,
        searchCols: [],
      };
      const ESTADOS = [
        "Bom",
        "Danificado",
        "Inservível",
        "Ocioso",
        "Antieconômico",
      ];

      function validate(item, cfg) {
        if (!item.encontrado) return { ...item, status: "irregular" };
        const det = [];
        const localObs = cfg.locked ? cfg.lockLocal.trim() : item.localAtual;
        const localRef = item.localBase;
        let div = false;
        if (localRef && localObs && norm(localRef) !== norm(localObs)) {
          det.push("LOCAL: " + localRef + " \u2192 " + localObs);
          div = true;
        }
        if (
          item.estadoBase &&
          item.estadoAtual &&
          norm(item.estadoBase) !== norm(item.estadoAtual)
        ) {
          det.push(
            "ESTADO: " + item.estadoBase + " \u2192 " + item.estadoAtual,
          );
          div = true;
        }
        if (div)
          return { ...item, status: "atualizar", detalhe: [...new Set(det)] };
        return { ...item, status: "regular", detalhe: [] };
      }

      function parseCsvFile(file) {
        return new Promise((res, rej) => {
          Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            dynamicTyping: false,
            encoding: "",
            transformHeader: (h) => h.trim(),
            transform: (v) => v.trim(),
            complete: (r) => {
              if (r.errors.length && r.data.length === 0) {
                rej(r.errors[0].message);
                return;
              }
              res({
                headers: r.meta.fields || [],
                rows: r.data,
                errors: r.errors,
                delimiter: r.meta.delimiter,
              });
            },
            error: (e) => rej(e.message),
          });
        });
      }

      function autoMapHeaders(h) {
        const f = (kws) =>
          h.find((c) => kws.some((k) => norm(c).includes(k))) || "";
        return {
          npat: f(["nrpatrimonio", "npat", "patrimonio", "tombamento"]),
          descricao: f(["descricao", "descri", "bem", "material", "nome"]),
          local: f(["localizacao", "local", "ambiente", "sala"]),
          estado: f(["desc_estado", "estado", "situacao", "conservacao"]),
          obs: f(["observacao", "obs"]),
        };
      }

      function defaultSearchCols(headers, mapping) {
        const want = [
          mapping.npat,
          mapping.descricao,
          mapping.local,
          mapping.estado,
        ].filter(Boolean);
        const base = want.filter((h) => headers.includes(h));
        return base.length ? base : headers.slice(0, 4);
      }

      function Badge({ status }) {
        const m = {
          regular: ["badge b-regular", "REGULAR"],
          atualizar: ["badge b-atualizar", "ATUALIZAR"],
          irregular: ["badge b-irregular", "IRREGULAR"],
        };
        const [cls, lbl] = m[status] || ["badge b-irregular", "IRREGULAR"];
        return <span className={cls}>{lbl}</span>;
      }

      function ItemCard({ item, idx, localValues, onEdit, onRemove }) {
        const [open, setOpen] = useState(false);
        const cardCls =
          "icard" +
          (item.status === "atualizar"
            ? " c-atu"
            : item.status === "irregular"
              ? " c-irr"
              : "") +
          (open ? " expanded" : "");
        const tagCls =
          item.status === "atualizar"
            ? "dtag dtag-atu"
            : item.status === "irregular"
              ? "dtag dtag-irr"
              : "dtag";
        return (
          <div className={cardCls}>
            <div className="ic-summary" onClick={() => setOpen((o) => !o)}>
              <div className="ic-left">
                <span className="ic-npat">{item.npat || "—"}</span>
                <span className="ic-desc" title={item.descricao}>
                  {item.descricao || "—"}
                </span>
                {item.detalhe.length > 0 && (
                  <div className="ic-tags-preview">
                    {item.detalhe.map((d, i) => (
                      <span key={i} className={tagCls}>
                        {d}
                      </span>
                    ))}
                  </div>
                )}
              </div>
              <div className="ic-right">
                <Badge status={item.status} />
                <span className="ic-chev">&#9660;</span>
              </div>
            </div>
            {open && (
              <div className="ic-body">
                <div className="ic-grid">
                  <div className="ic-field">
                    <span>Local base</span>
                    <strong>{item.localBase || "—"}</strong>
                  </div>
                  <div className="ic-field">
                    <span>Local conferido</span>
                    {localValues.length > 0 ? (
                      <select
                        className="ic-sel"
                        value={item.localAtual}
                        onChange={(e) =>
                          onEdit(idx, "localAtual", e.target.value)
                        }
                      >
                        <option value="">—</option>
                        {localValues.map((v) => (
                          <option key={v} value={v}>
                            {v}
                          </option>
                        ))}
                      </select>
                    ) : (
                      <input
                        className="ic-inp"
                        value={item.localAtual}
                        placeholder="Local"
                        onChange={(e) =>
                          onEdit(idx, "localAtual", e.target.value)
                        }
                      />
                    )}
                  </div>
                  <div className="ic-field">
                    <span>Estado base</span>
                    <strong>{item.estadoBase || "—"}</strong>
                  </div>
                  <div className="ic-field">
                    <span>Est. conferido</span>
                    <select
                      className="ic-sel"
                      value={item.estadoAtual}
                      onChange={(e) =>
                        onEdit(idx, "estadoAtual", e.target.value)
                      }
                    >
                      <option value="">—</option>
                      {ESTADOS.map((o) => (
                        <option key={o} value={o}>
                          {o}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="ic-field" style={{ gridColumn: "span 2" }}>
                    <span>Observação</span>
                    <input
                      className="ic-inp"
                      value={item.obs || ""}
                      placeholder="Opcional"
                      onChange={(e) => onEdit(idx, "obs", e.target.value)}
                    />
                  </div>
                </div>
                <div className="ic-footer">
                  <button
                    className="btn btn-danger btn-sm"
                    onClick={() => onRemove(idx)}
                  >
                    Remover
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      function TableRow({ item, idx, localValues, onEdit, onRemove }) {
        const cls =
          item.status === "atualizar"
            ? "tr-atu"
            : item.status === "irregular"
              ? "tr-irr"
              : "";
        const tagCls =
          "dtag" +
          (item.status === "atualizar"
            ? " dtag-atu"
            : item.status === "irregular"
              ? " dtag-irr"
              : "");
        return (
          <tr className={cls}>
            <td>
              <span
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: "11px",
                  whiteSpace: "nowrap",
                }}
              >
                {item.npat || "—"}
              </span>
            </td>
            <td style={{ maxWidth: 200 }}>{item.descricao || "—"}</td>
            <td style={{ color: "var(--muted)", whiteSpace: "nowrap" }}>
              {item.localBase || "—"}
            </td>
            <td>
              {localValues.length > 0 ? (
                <select
                  className="inline-sel"
                  value={item.localAtual}
                  onChange={(e) => onEdit(idx, "localAtual", e.target.value)}
                >
                  <option value="">—</option>
                  {localValues.map((v) => (
                    <option key={v} value={v}>
                      {v}
                    </option>
                  ))}
                </select>
              ) : (
                <input
                  className="inline-inp"
                  value={item.localAtual}
                  placeholder="Local"
                  onChange={(e) => onEdit(idx, "localAtual", e.target.value)}
                />
              )}
            </td>
            <td style={{ color: "var(--muted)", whiteSpace: "nowrap" }}>
              {item.estadoBase || "—"}
            </td>
            <td>
              <select
                className="inline-sel"
                value={item.estadoAtual}
                onChange={(e) => onEdit(idx, "estadoAtual", e.target.value)}
              >
                <option value="">—</option>
                {ESTADOS.map((o) => (
                  <option key={o} value={o}>
                    {o}
                  </option>
                ))}
              </select>
            </td>
            <td>
              <Badge status={item.status} />
            </td>
            <td>
              {item.detalhe.map((d, i) => (
                <span key={i} className={tagCls}>
                  {d}
                </span>
              ))}
            </td>
            <td>
              <input
                className="inline-inp"
                value={item.obs || ""}
                placeholder="Obs."
                onChange={(e) => onEdit(idx, "obs", e.target.value)}
              />
            </td>
            <td>
              <button
                className="btn btn-danger btn-sm"
                onClick={() => onRemove(idx)}
              >
                ✕
              </button>
            </td>
          </tr>
        );
      }

      function Toast({ msg }) {
        return msg ? (
          <div
            className="toast"
            style={{ opacity: 1, transform: "translateY(0)" }}
          >
            {msg}
          </div>
        ) : null;
      }

      /* ═══════════ APP ═══════════════════════════════════════ */
      function App() {
        const [view, setView] = useState("conf");
        const [csv, setCsv] = useState(() => {
          try {
            const c = localStorage.getItem(STORAGE.csv);
            return c ? JSON.parse(c) : { headers: [], rows: [] };
          } catch {
            return { headers: [], rows: [] };
          }
        });
        const [parseInfo, setParseInfo] = useState(null);
        const [cfg, setCfg] = useState(() => {
          try {
            const c = localStorage.getItem(STORAGE.cfg);
            return c ? { ...DEF_CFG, ...JSON.parse(c) } : DEF_CFG;
          } catch {
            return DEF_CFG;
          }
        });
        const [items, setItems] = useState(() => {
          try {
            const i = localStorage.getItem(STORAGE.items);
            return i ? JSON.parse(i) : [];
          } catch {
            return [];
          }
        });
        const [current, setCurrent] = useState(null);
        const [npat, setNpat] = useState("");
        const [editLocal, setEditLocal] = useState("");
        const [editEstado, setEditEstado] = useState("");
        const [editObs, setEditObs] = useState("");
        const [showManual, setShowManual] = useState(false);
        const [manualDesc, setManualDesc] = useState("");
        const [manualLocal, setManualLocal] = useState("");
        const [manualEstado, setManualEstado] = useState("");
        const [manualMotivo, setManualMotivo] = useState("sem_id");
        const [genericTerm, setGenericTerm] = useState("");
        const [genericCol, setGenericCol] = useState("");
        const [genericResults, setGenericResults] = useState(null);
        const [selectedRows, setSelectedRows] = useState(new Set());
        const [rcardExpanded, setRcardExpanded] = useState(false);
        const [fileMeta, setFileMeta] = useState(null);
        const [toast, setToast] = useState("");
        const [statusFilter, setStatusFilter] = useState(null);
        /* FIX #1 - lock state: campo de texto livre para travar */
        const [lockDraft, setLockDraft] = useState("");
        const debounceRef = useRef(null);
        const npatRef = useRef(null);

        useEffect(() => {
          localStorage.setItem(STORAGE.cfg, JSON.stringify(cfg));
        }, [cfg]);
        useEffect(() => {
          localStorage.setItem(STORAGE.items, JSON.stringify(items));
        }, [items]);
        useEffect(() => {
          localStorage.setItem(STORAGE.csv, JSON.stringify(csv));
        }, [csv]);
        useEffect(() => {
          localStorage.setItem(STORAGE.csv, JSON.stringify(csv));
        }, [csv]);
        useEffect(() => {
          setRcardExpanded(false);
        }, [current]);
        const showToast = useCallback((msg) => {
          setToast(msg);
          setTimeout(() => setToast(""), 2400);
        }, []);

        const localValues = useMemo(() => {
          if (!cfg.mapping.local || !csv.rows.length) return [];
          return [
            ...new Set(
              csv.rows
                .map((r) => String(r[cfg.mapping.local] || "").trim())
                .filter(Boolean),
            ),
          ].sort();
        }, [csv, cfg.mapping.local]);

        const filteredItems = useMemo(
          () =>
            statusFilter
              ? items.filter((i) => i.status === statusFilter)
              : items,
          [items, statusFilter],
        );

        /* FIX #2 - conjunto de NPATs já na lista */
        const npatSet = useMemo(
          () => new Set(items.map((i) => i.npat).filter(Boolean)),
          [items],
        );

        function toggleFilter(s) {
          setStatusFilter((f) => (f === s ? null : s));
        }

        /* FIX #1 - toggleLock: usa lockDraft (quando sem localValues) ou editLocal (quando select) */
        function toggleLock() {
          if (cfg.locked) {
            /* destravar: preserva o valor visível no draft para edição */
            setLockDraft(cfg.lockLocal);
            setCfg((c) => ({ ...c, locked: false }));
          } else {
            /* travar: usa o valor que está no draft ou no editLocal se vier de select */
            const v = (localValues.length > 0 ? editLocal : lockDraft).trim();
            if (!v) {
              showToast("Selecione ou digite um local antes de travar.");
              return;
            }
            setCfg((c) => ({ ...c, lockLocal: v, locked: true }));
            setEditLocal(
              v,
            ); /* garante que o campo editável reflete o valor travado */
          }
        }

        async function handleFile(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          try {
            const r = await parseCsvFile(file);
            setCsv({
              headers: r.headers,
              rows: r.rows,
              errors: r.errors,
              delimiter: r.delimiter,
            });
            const mapping = autoMapHeaders(r.headers);
            const sCols = defaultSearchCols(r.headers, mapping);
            setCfg((c) => ({ ...c, mapping, searchCols: sCols }));
            setGenericCol(mapping.npat || r.headers[0] || "");
            const size =
              file.size > 1024
                ? (file.size / 1024).toFixed(1) + " KB"
                : file.size + " B";
            setFileMeta({
              name: file.name,
              mod: new Date(file.lastModified).toLocaleDateString("pt-BR"),
              load: new Date().toLocaleTimeString("pt-BR", {
                hour: "2-digit",
                minute: "2-digit",
              }),
              size,
              rows: r.rows.length,
              cols: r.headers.length,
              delim: r.delimiter === "\t" ? "TAB" : '"' + r.delimiter + '"',
              errs: r.errors.length,
            });
            setParseInfo(
              r.errors.length
                ? "PapaParse: " + r.errors.length + " aviso(s)"
                : null,
            );
            showToast("Base carregada: " + r.rows.length + " registros");
          } catch (err) {
            showToast("Erro ao ler o arquivo.");
            setParseInfo("Erro: " + String(err));
          }
        }

        function consultar(npatVal) {
          const n = (npatVal ?? npat).trim();
          if (!n) {
            setCurrent(null);
            return;
          }
          if (!cfg.mapping.npat) {
            showToast("Configure a coluna NPAT em Config.");
            return;
          }
          const row = csv.rows.find(
            (r) => String(r[cfg.mapping.npat] || "").trim() === n,
          );
          const get = (col) =>
            col && row ? String(row[col] ?? "").trim() : "";
          const localBase = get(cfg.mapping.local);
          /* FIX #1 - se travado, local conferido já vem do lock; senão usa base */
          const initLocal = cfg.locked ? cfg.lockLocal : localBase;
          if (row) {
            setCurrent({
              npat: n,
              descricao: get(cfg.mapping.descricao),
              localBase,
              estadoBase: get(cfg.mapping.estado),
              _rawRow: row,
              localAtual: initLocal,
              estadoAtual: get(cfg.mapping.estado),
              obs: "",
              encontrado: true,
              status: "regular",
              detalhe: [],
            });
            setEditLocal(initLocal);
            setEditEstado(get(cfg.mapping.estado));
          } else {
            setCurrent({
              npat: n,
              descricao: "",
              localBase: "",
              estadoBase: "",
              _rawRow: null,
              localAtual: cfg.locked ? cfg.lockLocal : "",
              estadoAtual: "",
              obs: "",
              encontrado: false,
              status: "irregular",
              detalhe: ["REGISTRO NÃO ENCONTRADO"],
            });
            setEditLocal(cfg.locked ? cfg.lockLocal : "");
            setEditEstado("");
          }
          setEditObs("");
          setShowManual(false);
        }

        function handleNpatInput(v) {
          setNpat(v);
          clearTimeout(debounceRef.current);
          if (!v.trim()) {
            setCurrent(null);
            return;
          }
          debounceRef.current = setTimeout(() => consultar(v), 400);
        }

        function handleNpatKey(e) {
          if (e.key === "Enter") {
            e.preventDefault();
            clearTimeout(debounceRef.current);
            if (current) adicionarItem();
            else consultar();
          }
        }

        /* FIX #2 - bloqueia duplicatas */
        function adicionarItem() {
          if (!current) {
            showToast("Aguarde a consulta.");
            return;
          }
          const npatAlvo = current.npat;
          if (npatAlvo && npatSet.has(npatAlvo)) {
            showToast("Este NPAT já está na lista.");
            return;
          }
          const item = validate(
            {
              ...current,
              localAtual: cfg.locked ? cfg.lockLocal : editLocal,
              estadoAtual: editEstado,
              obs: editObs,
            },
            cfg,
          );
          const { _rawRow, ...safe } = item;
          setItems((prev) => [...prev, safe]);
          limparAtual();
          showToast("Item adicionado");
        }

        function limparAtual() {
          setCurrent(null);
          setNpat("");
          setEditLocal(cfg.locked ? cfg.lockLocal : "");
          setEditEstado("");
          setEditObs("");
          setShowManual(false);
          clearTimeout(debounceRef.current);
          setTimeout(() => npatRef.current?.focus(), 50);
        }

        function adicionarManual() {
          /* manual sem NPAT: permite; com NPAT: verifica duplicata */
          const npatAlvo = npat.trim();
          if (npatAlvo && npatSet.has(npatAlvo)) {
            showToast("Este NPAT já está na lista.");
            return;
          }
          const det =
            manualMotivo === "sem_id"
              ? ["SEM IDENTIFICAÇÃO DE PATRIMÔNIO"]
              : ["REGISTRO NÃO ENCONTRADO"];
          setItems((prev) => [
            ...prev,
            {
              npat: npatAlvo,
              descricao: manualDesc,
              localBase: "",
              estadoBase: "",
              localAtual: manualLocal,
              estadoAtual: manualEstado,
              obs: "",
              encontrado: false,
              status: "irregular",
              detalhe: det,
            },
          ]);
          setShowManual(false);
          setManualDesc("");
          setManualLocal("");
          setManualEstado("");
          limparAtual();
          showToast("Item manual adicionado");
        }

        function editItem(idx, field, value) {
          const globalIdx = items.indexOf(filteredItems[idx]);
          if (globalIdx < 0) return;
          setItems((prev) => {
            const n = [...prev];
            n[globalIdx] = { ...n[globalIdx], [field]: value };
            if (field === "localAtual" || field === "estadoAtual")
              n[globalIdx] = validate(n[globalIdx], cfg);
            return n;
          });
        }

        function removeItem(idx) {
          const globalIdx = items.indexOf(filteredItems[idx]);
          if (globalIdx < 0) return;
          setItems((prev) => prev.filter((_, i) => i !== globalIdx));
        }

        function clearTable() {
          if (window.confirm("Limpar toda a tabela?")) setItems([]);
        }

        function runSearch() {
          const t = norm(genericTerm);
          const col = genericCol;
          if (!t || !col) return;
          setGenericResults(
            csv.rows
              .filter((r) => norm(r[col] || "").includes(t))
              .slice(0, 200),
          );
          setSelectedRows(new Set());
        }

        function toggleRowSelect(i) {
          setSelectedRows((prev) => {
            const n = new Set(prev);
            n.has(i) ? n.delete(i) : n.add(i);
            return n;
          });
        }
        function toggleSelectAll() {
          if (!genericResults) return;
          setSelectedRows(
            selectedRows.size === genericResults.length
              ? new Set()
              : new Set(genericResults.map((_, i) => i)),
          );
        }

        /* FIX #2 - adicionarSelecionados também filtra duplicatas */
        function adicionarSelecionados() {
          if (!genericResults || selectedRows.size === 0) {
            showToast("Selecione ao menos um item.");
            return;
          }
          const novos = [];
          const duplicados = [];
          selectedRows.forEach((i) => {
            const row = genericResults[i];
            const n = String(row[cfg.mapping.npat] || "").trim();
            if (n && npatSet.has(n)) {
              duplicados.push(n);
              return;
            }
            const get = (col) => (col ? String(row[col] ?? "").trim() : "");
            const localBase = get(cfg.mapping.local);
            const localObs = cfg.locked ? cfg.lockLocal : localBase;
            novos.push(
              validate(
                {
                  npat: n,
                  descricao: get(cfg.mapping.descricao),
                  localBase,
                  estadoBase: get(cfg.mapping.estado),
                  localAtual: localObs,
                  estadoAtual: get(cfg.mapping.estado),
                  obs: "",
                  encontrado: true,
                  status: "regular",
                  detalhe: [],
                },
                cfg,
              ),
            );
          });
          if (novos.length) setItems((prev) => [...prev, ...novos]);
          setSelectedRows(new Set());
          const msg =
            novos.length +
            " adicionado(s)" +
            (duplicados.length
              ? " · " + duplicados.length + " duplicado(s) ignorado(s)"
              : "");
          showToast(msg);
          if (novos.length) setView("conf");
        }

        function usarResultadoUnico(row) {
          const n = row[cfg.mapping.npat] || "";
          setNpat(n);
          consultar(n);
          setView("conf");
        }

        const activeCols =
          cfg.searchCols && cfg.searchCols.length
            ? cfg.searchCols.filter((h) => csv.headers.includes(h))
            : defaultSearchCols(csv.headers, cfg.mapping);

        function toggleSearchCol(h) {
          setCfg((c) => {
            const cur =
              c.searchCols && c.searchCols.length
                ? c.searchCols
                : defaultSearchCols(csv.headers, c.mapping);
            const next = cur.includes(h)
              ? cur.filter((x) => x !== h)
              : [...cur, h];
            return { ...c, searchCols: next.length ? next : cur };
          });
        }

        function exportCSV() {
          if (!items.length) {
            alert("Nenhum item.");
            return;
          }
          const hdr =
            "NPAT;Descrição;Local base;Local conferido;Estado base;Est. conferido;Status;Detalhamento;Obs.";
          const lines = items.map((i) =>
            [
              i.npat,
              i.descricao,
              i.localBase,
              i.localAtual,
              i.estadoBase,
              i.estadoAtual,
              i.status.toUpperCase(),
              i.detalhe.join(" | "),
              i.obs,
            ]
              .map((v) => '"' + String(v || "").replace(/"/g, '""') + '"')
              .join(";"),
          );
          dl(
            [hdr, ...lines].join("\n"),
            "text/csv;charset=utf-8",
            "npat-control.csv",
          );
        }

        function exportHTML() {
          if (!items.length) {
            alert("Nenhum item.");
            return;
          }
          const rows = items
            .map(
              (i) =>
                "<tr><td>" +
                esc(i.npat) +
                "</td><td>" +
                esc(i.descricao) +
                "</td><td>" +
                esc(i.localBase) +
                "</td><td>" +
                esc(i.localAtual) +
                "</td><td>" +
                esc(i.estadoBase) +
                "</td><td>" +
                esc(i.estadoAtual) +
                "</td><td>" +
                esc(i.status.toUpperCase()) +
                "</td><td>" +
                esc(i.detalhe.join(" | ")) +
                "</td><td>" +
                esc(i.obs) +
                "</td></tr>",
            )
            .join("");
          const html =
            '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>NPAT CONTROL</title><style>body{font-family:Arial,sans-serif;padding:20px;font-size:13px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:7px;text-align:left;vertical-align:top}th{background:#f5f5f5}</style></head><body><h2>NPAT CONTROL</h2><p>Total: ' +
            items.length +
            " itens</p><table><thead><tr><th>NPAT</th><th>Descrição</th><th>Local base</th><th>Local conf.</th><th>Estado base</th><th>Est. conf.</th><th>Status</th><th>Detalhamento</th><th>Obs.</th></tr></thead><tbody>" +
            rows +
            "</tbody></table></body></html>";
          dl(html, "text/html;charset=utf-8", "npat-control.html");
        }

        function dl(content, mime, name) {
          const a = Object.assign(document.createElement("a"), {
            href: URL.createObjectURL(new Blob([content], { type: mime })),
            download: name,
          });
          document.body.appendChild(a);
          a.click();
          a.remove();
        }

        const total = items.length,
          reg = items.filter((i) => i.status === "regular").length,
          atu = items.filter((i) => i.status === "atualizar").length,
          irr = items.filter((i) => i.status === "irregular").length;
        const lv = localValues;

        /* FIX #2 - aviso de duplicata em tempo real */
        const isDuplicate =
          !!current && !!current.npat && npatSet.has(current.npat);

        /* FIX #1 - componente de campo local com cadeado */
        function LocalLockField() {
          const locked = cfg.locked;
          if (locked) {
            return (
              <div className={"lock-wrap is-locked"}>
                <input
                  className="lock-inp"
                  disabled
                  value={cfg.lockLocal}
                  readOnly
                />
                <button
                  className="lock-btn"
                  onClick={toggleLock}
                  title="Destravar local"
                >
                  🔒
                </button>
              </div>
            );
          }
          if (lv.length > 0) {
            /* tem lista de locais: select + cadeado */
            return (
              <div className={"lock-wrap" + (editLocal ? "" : " ")}>
                <select
                  className="lock-inp-sel"
                  value={editLocal}
                  onChange={(e) => setEditLocal(e.target.value)}
                >
                  <option value="">—</option>
                  {lv.map((v) => (
                    <option key={v} value={v}>
                      {v}
                    </option>
                  ))}
                </select>
                <button
                  className="lock-btn"
                  onClick={toggleLock}
                  title="Travar este local"
                >
                  🔓
                </button>
              </div>
            );
          }
          /* sem lista: input livre + cadeado */
          return (
            <div className="lock-wrap">
              <input
                className="lock-inp"
                value={lockDraft}
                placeholder="Local observado"
                onChange={(e) => {
                  setLockDraft(e.target.value);
                  setEditLocal(e.target.value);
                }}
                onKeyDown={(e) => e.key === "Enter" && toggleLock()}
              />
              <button
                className="lock-btn"
                onClick={toggleLock}
                title="Travar este local"
              >
                🔓
              </button>
            </div>
          );
        }

        return (
          <div className="app">
            <header className="header">
              <span
                className="brand"
                onClick={() => setView("conf")}
                style={{ cursor: "pointer" }}
              >
                NPAT CONTROL
              </span>
              <nav className="nav">
                {[
                  ["base", "CONSULTA"],
                  ["config", "CONFIGURAÇÕES"],
                  ["rel", "RELATÓRIOS"],
                ].map(([v, l]) => (
                  <button
                    key={v}
                    className={"nav-btn" + (view === v ? " active" : "")}
                    onClick={() => setView(v)}
                  >
                    {l}
                  </button>
                ))}
              </nav>
            </header>

            <div className="main">
              {/* ═══ CONFERÊNCIA: layout fixo, só a lista rola ═══ */}
              {view === "conf" && (
                <div className="conf-host">
                  <div className="conf-layout">
                    {/* zona superior fixa */}
                    <div className="conf-top">
                      <div className="panel" style={{ borderRadius: 14 }}>
                        {/* hero: input + ✓ */}
                        <div className="consult-hero">
                          <div className="consult-npat">
                            <input
                              ref={npatRef}
                              value={npat}
                              placeholder="Nº de patrimônio"
                              onChange={(e) => handleNpatInput(e.target.value)}
                              onKeyDown={handleNpatKey}
                              autoComplete="off"
                              inputMode="numeric"
                            />
                          </div>
                          <button
                            className="btn-add-hero"
                            disabled={!current || isDuplicate}
                            onClick={adicionarItem}
                            title="Adicionar à lista"
                          >
                            ✓
                          </button>
                        </div>
                        <div
                          style={{
                            display: "flex",
                            gap: 8,
                            marginBottom: 12,
                            flexWrap: "wrap",
                            alignItems: "center",
                          }}
                        >
                          {/* LOCAL CONFERIDO */}
                          <div class style={{ flex: 1, minWidth: 160 }}>
                            <LocalLockField />
                          </div>

                          {/* ESTADO CONFERIDO */}
                          <div style={{ flex: 1, minWidth: 140 }}>
                            {/*<label className="rfield-lbl"> Estado conferido </label> */}
                            <select
                              className="rfield-sel"
                              value={editEstado}
                              onChange={(e) => setEditEstado(e.target.value)}
                            >
                              <option value="">ESTADO</option>
                              {ESTADOS.map((o) => (
                                <option key={o} value={o}>
                                  {o}
                                </option>
                              ))}
                            </select>
                          </div>

                          {/* BOTÃO NOVO */}
                          <div style={{ flexShrink: 0 }}>
                            <button
                              className="btn btn-accent"
                              onClick={() => {
                                setShowManual(true);
                                setCurrent(null);
                              }}
                            >
                              + ADICIONAR ITEM IRREGULAR
                            </button>
                          </div>
                        </div>

                        {/* card de resultado - só aparece com NPAT válido ou manual */}
                        {(current || showManual) && (
                          <div className="rcard">
                            {/* ITEM REGULAR em formato icard expansível */}
                            {current &&
                              current.status === "regular" &&
                              !showManual && (
                                <div
                                  className={
                                    "icard" + (rcardExpanded ? " expanded" : "")
                                  }
                                >
                                  <div
                                    className="ic-summary"
                                    onClick={() =>
                                      setRcardExpanded(!rcardExpanded)
                                    }
                                    style={{ cursor: "pointer" }}
                                  >
                                    <div className="ic-left">
                                      <span className="ic-desc">
                                        {current.descricao}
                                      </span>
                                      <span className="ic-npat">
                                        {current.localBase} •{" "}
                                        {current.estadoBase}
                                      </span>
                                    </div>
                                    <Badge status="regular" />
                                  </div>

                                  {rcardExpanded && (
                                    <div className="ic-body">
                                      <div className="ic-grid">
                                        {Object.entries(
                                          current._rawRow || {},
                                        ).map(([k, v]) => (
                                          <div className="ic-field" key={k}>
                                            <span>{k}</span>
                                            <strong>{String(v)}</strong>
                                          </div>
                                        ))}
                                      </div>
                                      <div className="ic-footer">
                                        <button
                                          className="btn btn-ghost btn-sm"
                                          onClick={limparAtual}
                                        >
                                          Limpar
                                        </button>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              )}

                            {/* RESULTADO ATUALIZAR ou IRREGULAR */}
                            {current &&
                              current.status !== "regular" &&
                              !showManual && (
                                <div className="rcard-inner">
                                  <div className="rcard-head">
                                    <span className="rcard-npat">
                                      {current.npat || "—"}
                                    </span>
                                    <Badge status={current.status} />
                                  </div>
                                  <div className="rcard-grid">
                                    <div className="rfield">
                                      <span className="rfield-lbl">
                                        Descrição
                                      </span>
                                      <span className="rfield-val">
                                        {current.descricao || "—"}
                                      </span>
                                    </div>
                                    <div className="rfield">
                                      <span className="rfield-lbl">
                                        Local base
                                      </span>
                                      <span className="rfield-val">
                                        {current.localBase || "—"}
                                      </span>
                                    </div>
                                    <div className="rfield">
                                      <span className="rfield-lbl">
                                        Estado base
                                      </span>
                                      <span className="rfield-val">
                                        {current.estadoBase || "—"}
                                      </span>
                                    </div>
                                  </div>
                                  <div className="rcard-divider" />
                                  {isDuplicate && (
                                    <div className="dup-warn">
                                      ⚠ Este NPAT já está na lista de
                                      conferência.
                                    </div>
                                  )}
                                  <div className="rcard-actions">
                                    <button
                                      className="btn btn-ghost btn-sm"
                                      onClick={limparAtual}
                                    >
                                      Limpar
                                    </button>
                                  </div>
                                </div>
                              )}

                            {/* FORMULÁRIO MANUAL - ITEM IRREGULAR */}
                            {showManual && (
                              <div className="manual-inner">
                                <div className="manual-title">
                                  ITEM IRREGULAR
                                </div>
                                <div className="manual-grid">
                                  <div className="field">
                                    <label>NPAT</label>
                                    <input value={npat} readOnly />
                                  </div>
                                  <div className="field">
                                    <label>Descrição</label>
                                    <input
                                      value={manualDesc}
                                      placeholder="Ex.: Cadeira"
                                      onChange={(e) =>
                                        setManualDesc(e.target.value)
                                      }
                                    />
                                  </div>
                                  <div className="field">
                                    <label>Local</label>
                                    <input
                                      value={
                                        cfg.locked ? cfg.lockLocal : manualLocal
                                      }
                                      placeholder="Local observado"
                                      onChange={(e) =>
                                        setManualLocal(e.target.value)
                                      }
                                    />
                                  </div>
                                  <div className="field">
                                    <label>Estado</label>
                                    <input
                                      value={manualEstado}
                                      placeholder="Ex.: Bom"
                                      onChange={(e) =>
                                        setManualEstado(e.target.value)
                                      }
                                    />
                                  </div>
                                  <div className="field">
                                    <label>Observação</label>
                                    <input
                                      value={editObs}
                                      placeholder="Opcional"
                                      onChange={(e) =>
                                        setEditObs(e.target.value)
                                      }
                                    />
                                  </div>
                                  <div className="field">
                                    <label>Motivo</label>
                                    <select
                                      value={manualMotivo}
                                      onChange={(e) =>
                                        setManualMotivo(e.target.value)
                                      }
                                    >
                                      <option value="sem_id">
                                        Sem identificação
                                      </option>
                                      <option value="nao_encontrado">
                                        Não encontrado
                                      </option>
                                    </select>
                                  </div>
                                </div>
                                <button
                                  className="btn btn-accent"
                                  onClick={adicionarManual}
                                >
                                  Adicionar
                                </button>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* zona inferior: cabeçalho fixo + lista que rola */}
                    <div className="conf-bottom">
                      <div className="conf-bottom-head">
                        <div
                          style={{
                            display: "flex",
                            justifyContent: "space-between",
                            alignItems: "center",
                            flexWrap: "wrap",
                            gap: 8,
                          }}
                        >
                          <div className="summary-bar">
                            <span
                              className={
                                "spill sp-total" +
                                (statusFilter === null ? " active-filter" : "")
                              }
                              onClick={() => setStatusFilter(null)}
                            >
                              <span className="spill-n">{total}</span>Total
                            </span>
                            <span
                              className={
                                "spill sp-reg" +
                                (statusFilter === "regular"
                                  ? " active-filter"
                                  : "")
                              }
                              onClick={() => toggleFilter("regular")}
                            >
                              <span className="spill-n">{reg}</span>Regular
                            </span>
                            <span
                              className={
                                "spill sp-atu" +
                                (statusFilter === "atualizar"
                                  ? " active-filter"
                                  : "")
                              }
                              onClick={() => toggleFilter("atualizar")}
                            >
                              <span className="spill-n">{atu}</span>Atualizar
                            </span>
                            <span
                              className={
                                "spill sp-irr" +
                                (statusFilter === "irregular"
                                  ? " active-filter"
                                  : "")
                              }
                              onClick={() => toggleFilter("irregular")}
                            >
                              <span className="spill-n">{irr}</span>Irregular
                            </span>
                            {statusFilter && (
                              <span
                                style={{
                                  fontSize: 11,
                                  color: "var(--muted)",
                                  marginLeft: 2,
                                }}
                              >
                                — {filteredItems.length} exibido(s)
                              </span>
                            )}
                          </div>
                          <button
                            className="btn btn-danger btn-sm"
                            onClick={clearTable}
                          >
                            Limpar tabela
                          </button>
                        </div>
                      </div>

                      {/* FIX #3 - área de scroll confinada */}
                      <div className="conf-bottom-scroll">
                        <div className="table-wrap">
                          <table>
                            <thead>
                              <tr>
                                <th>NPAT</th>
                                <th>Descrição</th>
                                <th>Local base</th>
                                <th>Local conf.</th>
                                <th>Estado base</th>
                                <th>Est. conf.</th>
                                <th>Status</th>
                                <th>Detalhamento</th>
                                <th>Obs.</th>
                                <th></th>
                              </tr>
                            </thead>
                            <tbody>
                              {filteredItems.length === 0 ? (
                                <tr>
                                  <td
                                    colSpan={10}
                                    style={{
                                      textAlign: "center",
                                      color: "var(--hint)",
                                      padding: 32,
                                    }}
                                  >
                                    {statusFilter
                                      ? "Nenhum item com este status."
                                      : "Nenhum item adicionado ainda."}
                                  </td>
                                </tr>
                              ) : (
                                filteredItems.map((item, idx) => (
                                  <TableRow
                                    key={idx}
                                    item={item}
                                    idx={idx}
                                    localValues={lv}
                                    onEdit={editItem}
                                    onRemove={removeItem}
                                  />
                                ))
                              )}
                            </tbody>
                          </table>
                        </div>
                        <div className="card-list">
                          {filteredItems.length === 0 ? (
                            <div
                              style={{
                                textAlign: "center",
                                color: "var(--hint)",
                                padding: 32,
                                fontSize: 13,
                              }}
                            >
                              {statusFilter
                                ? "Nenhum item com este status."
                                : "Nenhum item adicionado ainda."}
                            </div>
                          ) : (
                            filteredItems.map((item, idx) => (
                              <ItemCard
                                key={idx}
                                item={item}
                                idx={idx}
                                localValues={lv}
                                onEdit={editItem}
                                onRemove={removeItem}
                              />
                            ))
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ═══ CONSULTA (ex-Base): apenas busca na base ═════════════════ */}
              {view === "base" && (
                <div className="tab-scroll">
                  <div className="tab-container">
                    <div className="panel">
                      <div className="ptitle">Consulta na base</div>
                      <div
                        style={{
                          display: "flex",
                          gap: 8,
                          alignItems: "flex-end",
                          flexWrap: "wrap",
                          marginBottom: 8,
                        }}
                      >
                        <div
                          className="field"
                          style={{ flex: 1, minWidth: 140 }}
                        >
                          <label>Termo</label>
                          <input
                            value={genericTerm}
                            placeholder="Ex.: PROJETOR"
                            onChange={(e) => setGenericTerm(e.target.value)}
                            onKeyDown={(e) => e.key === "Enter" && runSearch()}
                          />
                        </div>
                        <div className="field" style={{ minWidth: 140 }}>
                          <label>Coluna de busca</label>
                          <select
                            value={genericCol}
                            onChange={(e) => setGenericCol(e.target.value)}
                          >
                            {csv.headers.map((h) => (
                              <option key={h} value={h}>
                                {h}
                              </option>
                            ))}
                          </select>
                        </div>
                        <button className="btn" onClick={runSearch}>
                          Pesquisar
                        </button>
                      </div>

                      {genericResults && (
                        <>
                          <div
                            style={{
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "space-between",
                              flexWrap: "wrap",
                              gap: 8,
                              marginBottom: 6,
                            }}
                          >
                            <span
                              style={{ fontSize: 12, color: "var(--muted)" }}
                            >
                              {genericResults.length} resultado(s) —{" "}
                              {selectedRows.size} selecionado(s)
                            </span>
                            <div style={{ display: "flex", gap: 6 }}>
                              <button
                                className="btn btn-sm"
                                onClick={toggleSelectAll}
                              >
                                {selectedRows.size === genericResults.length &&
                                genericResults.length > 0
                                  ? "Desmarcar tudo"
                                  : "Selecionar tudo"}
                              </button>
                              <button
                                className="btn btn-accent btn-sm"
                                disabled={selectedRows.size === 0}
                                onClick={adicionarSelecionados}
                              >
                                Adicionar ({selectedRows.size})
                              </button>
                            </div>
                          </div>
                          <div className="sr-list">
                            {genericResults.length === 0 ? (
                              <div
                                style={{
                                  padding: 20,
                                  textAlign: "center",
                                  color: "var(--hint)",
                                  fontSize: 13,
                                }}
                              >
                                Nenhum resultado.
                              </div>
                            ) : (
                              genericResults.map((r, i) => {
                                const nAlvo = String(
                                  r[cfg.mapping.npat] || "",
                                ).trim();
                                const dup = nAlvo && npatSet.has(nAlvo);
                                return (
                                  <div
                                    className="sr-row"
                                    key={i}
                                    style={{
                                      background: selectedRows.has(i)
                                        ? "var(--ibg)"
                                        : dup
                                          ? "#FFF8F7"
                                          : "",
                                    }}
                                  >
                                    <input
                                      type="checkbox"
                                      className="sr-check"
                                      checked={selectedRows.has(i)}
                                      onChange={() =>
                                        !dup && toggleRowSelect(i)
                                      }
                                      disabled={dup}
                                      title={dup ? "Já na lista" : ""}
                                    />
                                    <div
                                      className="sr-cells"
                                      onClick={() =>
                                        !dup && usarResultadoUnico(r)
                                      }
                                    >
                                      {activeCols.map((col) => (
                                        <span
                                          key={col}
                                          className={
                                            "sr-cell" +
                                            (col === cfg.mapping.npat
                                              ? " sr-cell-npat"
                                              : " sr-cell-flex")
                                          }
                                          title={r[col] || ""}
                                          style={{
                                            color: dup ? "var(--hint)" : "",
                                          }}
                                        >
                                          {r[col] || "—"}
                                        </span>
                                      ))}
                                      {dup && (
                                        <span
                                          style={{
                                            fontSize: 10,
                                            color: "var(--danger)",
                                            flexShrink: 0,
                                          }}
                                        >
                                          já adicionado
                                        </span>
                                      )}
                                    </div>
                                  </div>
                                );
                              })
                            )}
                          </div>
                          <div
                            style={{
                              fontSize: 11,
                              color: "var(--hint)",
                              marginTop: 6,
                            }}
                          >
                            Clique na linha para consultar individualmente ·
                            marque a caixa para seleção em lote
                          </div>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* ═══ CONFIG ══════════════════════════════════ */}
              {view === "config" && (
                <div className="tab-scroll">
                  <div className="tab-container" style={{ maxWidth: 720 }}>
                    {/* carregamento da base — movido de Base para Config */}
                    <div className="panel">
                      <div className="ptitle">Carregamento da base</div>
                      <div className="field" style={{ maxWidth: 420 }}>
                        <label>Arquivo CSV</label>
                        <input
                          type="file"
                          accept=".csv,.txt"
                          onChange={handleFile}
                        />
                      </div>
                      {parseInfo && (
                        <div className="parse-error">{parseInfo}</div>
                      )}
                      {fileMeta && (
                        <>
                          <div className="meta-grid">
                            {[
                              ["Arquivo", fileMeta.name],
                              ["Modificação", fileMeta.mod],
                              ["Carregamento", fileMeta.load],
                              ["Tamanho", fileMeta.size],
                              ["Linhas", fileMeta.rows],
                              ["Colunas", fileMeta.cols],
                            ].map(([l, v]) => (
                              <div className="meta-cell" key={l}>
                                <div className="mc-label">{l}</div>
                                <div className="mc-val" title={String(v)}>
                                  {v}
                                </div>
                              </div>
                            ))}
                          </div>
                          <div
                            style={{
                              marginTop: 8,
                              fontSize: 11,
                              color: "var(--muted)",
                            }}
                          >
                            Delimitador:{" "}
                            <span style={{ fontFamily: "var(--mono)" }}>
                              {fileMeta.delim}
                            </span>
                            {fileMeta.errs > 0 && (
                              <span
                                style={{
                                  color: "var(--danger)",
                                  marginLeft: 8,
                                }}
                              >
                                {fileMeta.errs} aviso(s)
                              </span>
                            )}
                          </div>
                        </>
                      )}
                    </div>
                    <div className="panel">
                      <div className="ptitle">Mapeamento de colunas</div>
                      <p
                        style={{
                          fontSize: 13,
                          color: "var(--muted)",
                          marginBottom: 14,
                        }}
                      >
                        O sistema detecta automaticamente ao carregar o arquivo.
                        Ajuste caso necessário.
                      </p>
                      <div className="grid-2">
                        {[
                          ["npat", "Coluna NPAT"],
                          ["descricao", "Coluna Descrição"],
                          ["local", "Coluna Local"],
                          ["estado", "Coluna Estado"],
                          ["obs", "Coluna Observação"],
                        ].map(([k, l]) => (
                          <div className="field" key={k}>
                            <label>{l}</label>
                            <select
                              value={cfg.mapping[k] || ""}
                              onChange={(e) =>
                                setCfg((c) => ({
                                  ...c,
                                  mapping: {
                                    ...c.mapping,
                                    [k]: e.target.value,
                                  },
                                }))
                              }
                            >
                              <option value="">Selecione</option>
                              {csv.headers.map((h) => (
                                <option key={h} value={h}>
                                  {h}
                                </option>
                              ))}
                            </select>
                          </div>
                        ))}
                      </div>
                    </div>

                    {csv.headers.length > 0 && (
                      <div className="panel">
                        <div className="ptitle">
                          Colunas exibidas na consulta da base
                        </div>
                        <p
                          style={{
                            fontSize: 13,
                            color: "var(--muted)",
                            marginBottom: 10,
                          }}
                        >
                          Selecione quais colunas aparecem nos resultados da
                          busca em Base.
                        </p>
                        <div className="check-grid">
                          {csv.headers.map((h) => (
                            <label key={h} className="check-item">
                              <input
                                type="checkbox"
                                checked={activeCols.includes(h)}
                                onChange={() => toggleSearchCol(h)}
                              />
                              <span
                                style={{
                                  overflow: "hidden",
                                  textOverflow: "ellipsis",
                                  whiteSpace: "nowrap",
                                }}
                              >
                                {h}
                              </span>
                            </label>
                          ))}
                        </div>
                      </div>
                    )}

                    <div
                      style={{
                        display: "flex",
                        justifyContent: "flex-end",
                        paddingBottom: 40,
                      }}
                    >
                      <button
                        className="btn btn-accent"
                        onClick={() => showToast("Configurações salvas")}
                      >
                        Salvar configurações
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
            <Toast msg={toast} />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
